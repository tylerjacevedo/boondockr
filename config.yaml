# ─────────────────────────────────────────────────────────────
# Boondockr v1.1 — config.yaml
# Edit this file to configure your users and campgrounds
# ─────────────────────────────────────────────────────────────

# ── Users ──────────────────────────────────────────────────────
# Add each person who should receive alerts.
# email: their email address
# watching: list of campground IDs they want alerts for
#           omit this field to receive alerts for ALL campgrounds

users:
  - name: "Tyler"
    email: "tyler.j.acevedo@gmail.com"
    watching: [232447, 232450]

#  - name: "Friend One"
#    email: "friend1@example.com"
#    watching: [232447]

#  - name: "Friend Two"
#    email: "friend2@example.com"
#    # No 'watching' key = receives alerts for ALL campgrounds


# ── Campgrounds ────────────────────────────────────────────────
# Add as many campgrounds as you want to watch.
# id: Find the campground ID on recreation.gov (see README)
# name: A friendly display name used in alerts
# date_start / date_end: The date range to watch (YYYY-MM-DD)
# site: A specific site number to watch, or null for any available
# day_filter: "all" | "weekends" | "weekdays"
# blackout_dates: Dates you are NOT interested in (YYYY-MM-DD)
# priority: Lower number = higher priority in alerts

campgrounds:
  - id: 232447
    name: "Upper Pines — Yosemite"
    date_start: "2026-05-04"
    date_end: "2026-11-30"
    site: null
    day_filter: "all"
    blackout_dates: []
    priority: 1

  - id: 232450
    name: "Lower Pines — Yosemite"
    date_start: "2026-05-04"
    date_end: "2026-11-30"
    site: null
    day_filter: "all"
    blackout_dates: []
    priority: 2


